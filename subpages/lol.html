<!DOCTYPE html>
<html lang='en' dir='ltr'>
  <head>
    <meta charset='utf-8'>
    <title>Difference</title>
    <style>
      :root {
        --a: #f90;
        --m: #fff;
        --t: #000;
        --t2: #fff;
      }
    </style>
    <link href="/style.css" rel="stylesheet">
    <script src="/common.js" type="text/javascript"></script>
  </head>
  <body style="margin: 2rem">
    <canvas id='canv' width="10" height="10"></canvas>
  </body>
  <script>
    ctx = canv.getContext('2d')
    var data = ctx.getImageData(0,0,canv.width,canv.height)
    var avgR = 0
    var avgG = 0
    var avgB = 0
    for (let i = 0; i < data.data.length; i += 4){
      let newR = Math.floor(Math.random()*255)
      let newG = Math.floor(Math.random()*255)
      let newB = Math.floor(Math.random()*255)
      data.data[i]   = newR
      data.data[i+1] = newG
      data.data[i+2] = newB
      avgR += newR
      avgG += newG
      avgB += newB
      data.data[i+3] = 255
    }
    //avgR /= canv.width*canv.height
    //avgG /= canv.width*canv.height
    //avgB /= canv.width*canv.height
    console.log(avgR,avgG,avgB)
    ctx.putImageData(data,0,0)
    window.setInterval(update,1)
    function update(){
      data = ctx.getImageData(0,0,canv.width,canv.height)
      let i = Math.floor(Math.random()*data.data.length/4)*4
      let newR = Math.floor(Math.random()*255)
      let newG = Math.floor(Math.random()*255)
      let newB = Math.floor(Math.random()*255)
      if (calcError(avgR-data.data[i]+newR,avgG-data.data[i+1]+newG,avgB-data.data[i+2]+newB)<calcError(avgR,avgG,avgB) || Math.random() > 0.99){
        avgR = avgR-data.data[i]+newR
        avgG = avgG-data.data[i+1]+newG
        avgB = avgB-data.data[i+2]+newB
        data.data[i]   = newR
        data.data[i+1] = newG
        data.data[i+2] = newB
        ctx.putImageData(data,0,0)
      }
      //console.log(calcError(avgR,avgG,avgB))
    }
    function calcError(a,b,c) {
      return Math.abs(a-25500)+Math.abs(b-25500)+Math.abs(c-0)
    }
  </script>
</html>
