<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <style>
      :root {
        --a: #f90;
        --m: #fff;
        --t: #000;
        --t2: #fff;
      }
    </style>
    <link href="/style.css" rel="stylesheet">
    <title>style settings</title>
    <script src="/common.js" type="text/javascript"></script>
    <meta charset="utf-8">
  </head>
  <body style="margin: 6rem">
    <div id="back" onclick="window.location='/'">❰❰</div>
    <div id="colorinp">
    <input type="text">
    <button>SET</button>
    <button onclick="document.getElementById('colorinp').style.display = 'none'">ESC</button>
    </div>
    <h1>style settings</h1>
      <div class="spcontainer" id="stylepickerstatic">
        <div onclick="setStyle('--m')"></div>
        <div onclick="setStyle('--a')"></div>
        <div onclick="setStyle('--t')"></div>
        <div onclick="setStyle('--t2')"></div>
        <div class="clstyle" onclick="setTheme(0)"><svg>
        <g>
        <rect stroke="#000000" id="svg_4" height="20" width="20" y="0" x="0" opacity="1" fill="#ffffff"/>
        <text xml:space="preserve" text-anchor="start" font-family="sans-serif" font-size="10" id="svg_5" y="10" x="2.5" opacity="undefined" stroke-width="0" stroke="#000" fill="#000000">C L</text>
        <text xml:space="preserve" text-anchor="start" font-family="sans-serif" font-size="7.5" id="svg_6" y="18" x="2.5" opacity="undefined" stroke-width="0" stroke="#000" fill="#000000">EAR</text>
        </g>
        </svg></div>
      </div>
  here are some premade and special styles
  <ul>
  <li>
    <h3>themes</h3>
    <button onclick="setTheme(0)">reset</button>
    <button onclick="setTheme(3)">papyrus</button>
    <button onclick="setTheme(1)">dark (cyan)</button>
    <button onclick="setTheme(2)">dark (gold)</button>
  </li>
  <li>
    <h3>sides</h3>
    <button onclick="setSpecialStyle(0)">reset</button>
    <button onclick="setSpecialStyle(1)">rainbow</button>
    <button onclick="setSpecialStyle(2)">random on load</button>
  </li>
  </ul>
  </body>
</html>
