  <script type="text/javascript">
  let logo
  var animate = true
  var startcount = 0
  var r = 0
  function preload() {
    if (!(Date.now() - getURLParams().c < 12000)){
      window.location="index.html"
    }
    logo = loadModel('assets/logo.stl',true)
  }

  function setup() {
    createCanvas(300, 200, WEBGL)
  }

  function draw() {
    clear()
    renderLogo()
  }
  function rot() {
    startcount = frameCount
    animate = true
    r = 0
  }
  function renderLogo(){
    if (animate == true){
      if(r < PI){
        r = (frameCount - startcount)* 0.01
      } else {
        animate = false
      }
    }
    rotateX(r)
    rotateY(r)
    scale(0.8)
    if (stylet != undefined){
     ambientLight(stylet.split('=')[1])
    }
    ambientMaterial(255);
    noStroke()
    model(logo)
  }
  </script>
